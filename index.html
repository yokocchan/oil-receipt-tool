<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ガソリンレシート 合計金額調整</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ee;
      --panel: #ffffff;
      --ink: #202124;
      --muted: #68635c;
      --line: #d8d2c7;
      --accent: #1f6f68;
      --accent-strong: #16534e;
      --warn: #b42318;
      --warn-bg: #fff0ed;
      --ok-bg: #eaf6f2;
      --soft: #efe9dd;
      --focus: #c78a2c;
      --shadow: 0 14px 34px rgba(44, 39, 31, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Yu Gothic", "Meiryo", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 2.4vw, 2.35rem);
      line-height: 1.25;
      letter-spacing: 0;
    }

    .target-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      white-space: nowrap;
      border-radius: 8px;
      font-weight: 700;
    }

    .target-badge span {
      color: var(--accent);
      font-size: 1.08rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      align-items: start;
    }

    .panel {
